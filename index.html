<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing's Lab</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0a0e14; color: #bfc7d5; line-height: 1.6; }
        .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; padding: 60px 0 40px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #3fb950, #1f6feb); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
        h1 { color: #e6edf3; font-size: 26px; margin-bottom: 6px; }
        .tagline { color: #6e7681; font-size: 14px; }
        .status { font-size: 13px; color: #3fb950; margin-top: 4px; }
        .status::before { content: "● "; }
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
        .links a { display: flex; align-items: center; gap: 10px; padding: 16px 20px; background: #12161e; border: 1px solid #1e2430; border-radius: 10px; color: #e6edf3; text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .links a:hover { border-color: #1f6feb; background: #161b24; }
        .links .icon { font-size: 20px; }
        .section { margin-bottom: 40px; }
        .section h2 { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #1e2430; }
        .skills { display: flex; flex-wrap: wrap; gap: 8px; }
        .skill { padding: 6px 14px; background: #12161e; border: 1px solid #1e2430; border-radius: 20px; font-size: 13px; color: #7ee787; }
        .post-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e2430; }
        .post-item a { color: #58a6ff; text-decoration: none; font-size: 14px; }
        .post-date { color: #484f58; font-size: 12px; white-space: nowrap; }
        .post-more { text-align: right; margin-top: 12px; }
        .post-more a { color: #8b949e; font-size: 13px; text-decoration: none; }
        .footer { text-align: center; padding: 40px 0; color: #30363d; font-size: 12px; }
        .footer span { margin: 0 8px; }
    </style>
</head>
<body>
<div class="container">

        <p class="status">bi-ng.top · 7 篇运维文章</p>
    </div>
    <div class="links">

        <a href="/about/"><span class="icon">👤</span>关于我<br><small style="color:#6e7681">联系方式</small></a>
        <a href="https://github.com/Bingsv/ops-portfolio"><span class="icon">💻</span>运维作品集<br><small style="color:#6e7681">Docker · Shell · Python</small></a>
        <a href="https://github.com/Bingsv/blog-source"><span class="icon">🔧</span>博客源码<br><small style="color:#6e7681">CI/CD 自动部署</small></a>
    </div>
    <div class="section">
        <h2>技术栈</h2>
        <div class="skills">
            <span class="skill">Linux</span><span class="skill">Docker</span><span class="skill">Nginx</span>
            <span class="skill">Shell</span><span class="skill">Python</span><span class="skill">Flask</span>
            <span class="skill">CI/CD</span><span class="skill">阿里云</span><span class="skill">MySQL</span>
            <span class="skill">Git</span><span class="skill">HTTPS/SSL</span>
        </div>
    </div>
    <div class="footer"><span>bi-ng.top</span><span>·</span><span>GitHub Pages</span><span>·</span><span>Hexo + Fluid</span></div>
